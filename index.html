<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Formulario Pedidos</title>

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
background:#020617;
padding:30px;
border-radius:10px;
border:1px solid #1e293b;
}

label{
display:block;
margin-top:15px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
background:#0f172a;
border:1px solid #1e293b;
color:white;
border-radius:6px;
box-sizing:border-box;
}

button{
margin-top:20px;
padding:12px;
width:100%;
background:#38bdf8;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
color:#0f172a;
}

#successMsg{
display:none;
margin-top:20px;
padding:14px;
background:#052e16;
border:1px solid #16a34a;
border-radius:6px;
color:#4ade80;
text-align:center;
font-weight:bold;
}

</style>

</head>
<body>

<div class="container">

<h2>Crear Pedido</h2>

<div id="successMsg"></div>

<form id="orderForm">

<label>ID del pedido</label>
<input id="order_id" readonly>

<label>Cliente</label>
<select id="customer_id"></select>

<label>Producto</label>
<select id="sku"></select>

<label>Cantidad</label>
<input id="quantity" type="number">

<label>Precio</label>
<input id="unit_price" readonly>

<label>Fecha</label>
<input id="order_date" type="date">

<label>Canal</label>
<select id="channel"></select>

<button type="submit">Crear pedido</button>

</form>

</div>

<script>

const API="https://gedutofcipeyzdbbrupg.supabase.co/rest/v1";
const KEY="sb_publishable_E4ruyIzTtJBsNt1Zs92VCQ_sZ7emINh";

const HEADERS={
apikey:KEY,
Authorization:"Bearer "+KEY,
"Content-Type":"application/json"
};

let prices={};

async function generateOrderId(){

const r=await fetch(API+"/orders?select=order_id&order=order_id.desc&limit=1",{headers:HEADERS});
const data=await r.json();

let next=1;

if(data.length>0){
const last=data[0].order_id.replace("O","");
next=parseInt(last)+1;
}

document.getElementById("order_id").value="O"+String(next).padStart(6,"0");

}

async function loadCustomers(){

const r=await fetch(API+"/customers?select=customer_id,name",{headers:HEADERS});
const data=await r.json();
const select=document.getElementById("customer_id");

data.forEach(c=>{
const opt=document.createElement("option");
opt.value=c.customer_id;
opt.textContent=c.customer_id+" - "+c.name;
select.appendChild(opt);
});

}

async function loadProducts(){

const r=await fetch(API+"/products?select=sku,category,cost",{headers:HEADERS});
const data=await r.json();
const select=document.getElementById("sku");

data.forEach(p=>{
prices[p.sku]=p.cost;
const opt=document.createElement("option");
opt.value=p.sku;
opt.textContent=p.sku+" - "+p.category;
select.appendChild(opt);
});

// set initial price for the first option
const firstSku=select.value;
if(firstSku) document.getElementById("unit_price").value=prices[firstSku]||0;

}

async function loadChannels(){

const r=await fetch(API+"/orders?select=channel",{headers:HEADERS});
const data=await r.json();
const unique=[...new Set(data.map(x=>x.channel))];
const select=document.getElementById("channel");

unique.forEach(c=>{
const opt=document.createElement("option");
opt.value=c;
opt.textContent=c;
select.appendChild(opt);
});

}

document.getElementById("sku").addEventListener("change",function(){
document.getElementById("unit_price").value=prices[this.value]||0;
});

function showError(msg){

const el=document.getElementById("successMsg");
el.textContent=msg;
el.style.background="#2d0a0a";
el.style.border="1px solid #dc2626";
el.style.color="#f87171";
el.style.display="block";

setTimeout(()=>{ el.style.display="none"; },6000);

}

function showSuccess(orderId){

const msg=document.getElementById("successMsg");
msg.textContent="Orden "+orderId+" creada con exito.";
msg.style.display="block";

setTimeout(()=>{
msg.style.display="none";
},4000);

}

function resetForm(){

document.getElementById("quantity").value="";
document.getElementById("order_date").value="";

const skuSelect=document.getElementById("sku");
skuSelect.selectedIndex=0;
document.getElementById("unit_price").value=prices[skuSelect.value]||0;

document.getElementById("customer_id").selectedIndex=0;
document.getElementById("channel").selectedIndex=0;

}

document.getElementById("orderForm").addEventListener("submit",async e=>{

e.preventDefault();

const btn=document.querySelector("button[type=submit]");
btn.disabled=true;
btn.textContent="Sending...";

const orderId=document.getElementById("order_id").value;

const order={
order_id:orderId,
customer_id:document.getElementById("customer_id").value,
sku:document.getElementById("sku").value,
quantity:parseInt(document.getElementById("quantity").value),
unit_price:parseFloat(document.getElementById("unit_price").value),
order_date:document.getElementById("order_date").value,
channel:document.getElementById("channel").value
};

try{

const r=await fetch(API+"/orders",{
method:"POST",
headers:{...HEADERS,"Prefer":"return=minimal"},
body:JSON.stringify(order)
});

if(!r.ok){
const err=await r.text();
showError("Error "+r.status+": "+err);
}else{
showSuccess(orderId);
resetForm();
generateOrderId();
}

}catch(err){
showError("Network error: "+err.message);
}finally{
btn.disabled=false;
btn.textContent="Registrar pedido";
}

});

generateOrderId();
loadCustomers();
loadProducts();
loadChannels();

</script>

</body>
</html>
